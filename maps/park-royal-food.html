  maxZoom: 19
}).addTo(map);

// Decode Google polyline
function decodePolyline(encoded) {
  var points = [];
  var index = 0, len = encoded.length;
  var lat = 0, lng = 0;
  while (index < len) {
    var b, shift = 0, result = 0;
    do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    var dlat = ((result & 1) ? ~(result >> 1) : (result >> 1));
    lat += dlat;
    shift = 0; result = 0;
    do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    var dlng = ((result & 1) ? ~(result >> 1) : (result >> 1));
    lng += dlng;
    points.push([lat / 1e5, lng / 1e5]);
  }
  return points;
}

var bounds = L.latLngBounds();

places.forEach(function(p) {
  var popupHtml = '<div class="popup-content">';

  if (p.address) popupHtml += '<div class="detail">' + p.address + '</div>';
  if (p.rating) popupHtml += '<div class="detail">Rating: ' + p.rating + (p.user_ratings_total ? ' (' + p.user_ratings_total + ' reviews)' : '') + '</div>';
  if (p.phone) popupHtml += '<div class="detail">Phone: ' + p.phone + '</div>';
  if (p.website) popupHtml += '<div class="detail"><a href="' + p.website + '" target="_blank">Website</a></div>';
  popupHtml += '</div>';

});

  var routePoints = decodePolyline(routePolyline);
  L.polyline(routePoints, {color: '#2196F3', weight: 5, opacity: 0.8}).addTo(map);
  routePoints.forEach(function(p) { bounds.extend(p); });
}

if (routeInfo && routeInfo.origin) {
  L.circleMarker([routeInfo.origin.lat, routeInfo.origin.lng], {
    radius: 10, color: '#4CAF50', fillColor: '#4CAF50', fillOpacity: 0.8
  }).addTo(map).bindPopup('<b>Start</b><br>' + (routeInfo.origin.address || ''));
  bounds.extend([routeInfo.origin.lat, routeInfo.origin.lng]);
}

if (bounds.isValid()) {
  map.fitBounds(bounds, {padding: [40, 40]});
